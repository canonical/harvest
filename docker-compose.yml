services:
  # ── Graph database ─────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI (remove in production)
      - "7687:7687"   # Bolt — only needed if you connect external tools
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-devpassword}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-devpassword}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── API server ─────────────────────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: knowledge-server/Dockerfile
      # host network lets the builder reach crates.io via the same routing
      # and proxy configuration that the host uses.
      network: host
    # host network gives the runtime container the same internet routing as
    # the host, so outbound calls to LLM APIs (Gemini, Anthropic, etc.) work.
    # neo4j is reachable at localhost:7687 because its port is published above.
    network_mode: host
    depends_on:
      neo4j:
        condition: service_healthy
    # Loads every var in .env into the container, including arbitrary
    # LLM_<NAME>_* multi-provider vars (see LLM comment below) that can't be
    # enumerated here since their names aren't known ahead of time. Entries
    # under `environment:` still take precedence over same-named vars here.
    env_file:
      - .env
    environment:
      # Neo4j — reachable at localhost because port 7687 is published to the host.
      NEO4J_URI:      bolt://localhost:7687
      NEO4J_USER:     "${NEO4J_USER:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-devpassword}"

      # Auth — generate with: openssl rand -base64 32
      JWT_SECRET: "${JWT_SECRET}"

      # LLM — set PROVIDER to anthropic, gemini, or openai-compatible.
      # For multiple providers (with fallback priority), skip these flat vars
      # and define LLM_<NAME>_PROVIDER / LLM_<NAME>_MODEL / LLM_<NAME>_API_KEY
      # / LLM_<NAME>_PRIORITY (etc.) in .env instead — e.g. LLM_GEMINI_* and
      # LLM_CLAUDE_*. Every LLM_<NAME>_PROVIDER found becomes its own [[llm]]
      # block; these flat vars are only used when no named ones are set.
      #
      # Optional per-provider chat-page selector settings (named blocks only):
      # LLM_<NAME>_ID            stable id used by the chat page's model picker
      #                           (default: <NAME> lowercased)
      # LLM_<NAME>_EXPOSE_TO_UI  set to false to keep a provider failover-only,
      #                           hidden from the picker (default: true)
      # LLM_<NAME>_NAME          display name shown in the picker
      #                           (default: the provider kind)
      # LLM_<NAME>_MODELS        comma-separated allowlist of model names to
      #                           offer in the picker (default: all discovered
      #                           models)
      LLM_PROVIDER: "${LLM_PROVIDER:-anthropic}"
      LLM_MODEL:    "${LLM_MODEL:-claude-sonnet-4-6}"
      LLM_API_KEY:  "${LLM_API_KEY}"
      # For openai-compatible only:
      LLM_BASE_URL: "${LLM_BASE_URL:-}"

      # Agents — PUBLIC_URL is embedded in the install script returned to browsers.
      # Set this to the publicly reachable URL of the web-ui service.
      PUBLIC_URL: "${PUBLIC_URL:-http://localhost}"

      # Optional feature flags
      ENABLE_DOCS:       "${ENABLE_DOCS:-false}"
      ALLOW_LOCAL_LOGIN: "${ALLOW_LOCAL_LOGIN:-true}"

      # Optional: Google OAuth
      GOOGLE_CLIENT_ID:     "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      GOOGLE_REDIRECT_URI:  "${GOOGLE_REDIRECT_URI:-}"

      # Optional: OIDC SSO
      OIDC_ISSUER_URL:    "${OIDC_ISSUER_URL:-}"
      OIDC_CLIENT_ID:     "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URI:  "${OIDC_REDIRECT_URI:-}"
      OIDC_DISPLAY_NAME:  "${OIDC_DISPLAY_NAME:-}"

      # Optional: LXD — set LXD_ENDPOINT + LXD_TRUST_TOKEN (from `lxc config
      # trust add --name harvest`, run once against the cluster) to enable
      # "Let Harvest create and manage agent" in the web UI; Harvest generates
      # and self-registers its own client identity. Set LXD_CLIENT_CERT/
      # LXD_CLIENT_KEY instead to manage the identity yourself.
      LXD_ENDPOINT:     "${LXD_ENDPOINT:-}"
      LXD_TRUST_TOKEN:  "${LXD_TRUST_TOKEN:-}"
      LXD_CLIENT_CERT:  "${LXD_CLIENT_CERT:-}"
      LXD_CLIENT_KEY:   "${LXD_CLIENT_KEY:-}"
      LXD_CA_CERT:      "${LXD_CA_CERT:-}"
      LXD_INSECURE:     "${LXD_INSECURE:-}"
      LXD_PROJECT:      "${LXD_PROJECT:-}"
      LXD_IMAGE_ALIAS:  "${LXD_IMAGE_ALIAS:-}"
      LXD_IMAGE_SERVER: "${LXD_IMAGE_SERVER:-}"
      LXD_PROFILE:      "${LXD_PROFILE:-}"
    # Mount a hand-crafted config instead of using env vars:
    # volumes:
    #   - ./server.toml:/etc/harvest/server.toml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Web UI ─────────────────────────────────────────────────────────────────
  web-ui:
    build:
      context: .
      dockerfile: web-ui/Dockerfile
    ports:
      - "${WEB_PORT:-80}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      server:
        condition: service_healthy

volumes:
  neo4j_data:
