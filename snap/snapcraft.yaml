name: harvest
base: core24
version: '0.1.0'
summary: AI-powered code knowledge graph server and web interface
description: |
  Harvest exposes an AI-powered HTTP API and web interface for querying code
  knowledge graphs stored in Neo4j.  Agents can connect to it to run commands
  on remote machines.

  Prerequisites
  ─────────────
  A running Neo4j instance (not bundled in this snap).

  Quick start
  ───────────
  1. Set required credentials:
       snap set harvest \
         neo4j.password=<neo4j-password> \
         llm.primary.provider=anthropic \
         llm.primary.api-key=<llm-api-key> \
         auth.jwt-secret=$(openssl rand -base64 32)

  2. Start the services:
       snap start harvest.serve
       snap start harvest.ui

  3. Open http://localhost:3000 in your browser.

  Snap configuration keys
  ───────────────────────
  neo4j.host                  Neo4j hostname               (default: localhost)
  neo4j.port                  Neo4j bolt port              (default: 7687)
  neo4j.user                  Neo4j username               (default: neo4j)
  neo4j.password              Neo4j password               (required)
  server.host                 API bind address             (default: 127.0.0.1)
  server.port                 API port                     (default: 8080)

  LLM providers — define any number with user-chosen names:
  llm.<name>.provider         anthropic | gemini | openai-compatible
  llm.<name>.api-key          API key (setting this enables the provider)
  llm.<name>.model            Model name
  llm.<name>.base-url         Base URL (openai-compatible only)
  llm.<name>.timeout-secs     Per-request timeout          (default: 120)
  llm.<name>.max-retries      Retry limit per request      (default: 3)
  llm.<name>.priority         Lower = tried first on rate limits  (default: 0)

  Example — Anthropic primary, Gemini fallback:
    snap set harvest \
      llm.primary.provider=anthropic llm.primary.api-key=sk-ant-... \
      llm.fallback.provider=gemini   llm.fallback.api-key=AIza... \
      llm.fallback.priority=1

  agent.max-iterations        Agent iteration limit        (default: 20)
  agent.compaction-threshold-chars  Context compaction trigger  (default: 40000)
  agent.compaction-keep-last  Messages kept after compaction  (default: 6)
  auth.jwt-secret             JWT signing secret           (required)
  auth.allow-local-login      Enable username/password login  (default: true)
  auth.google.client-id       Google OAuth client ID       (optional)
  auth.google.client-secret   Google OAuth client secret   (optional)
  auth.google.redirect-uri    Google OAuth redirect URI    (optional)
  auth.oidc.issuer-url        OIDC provider URL            (optional)
  auth.oidc.client-id         OIDC client ID               (optional)
  auth.oidc.client-secret     OIDC client secret           (optional)
  auth.oidc.redirect-uri      OIDC redirect URI            (optional)
  auth.oidc.display-name      OIDC provider display name   (optional)
  agents.public-url           Public URL for agent callbacks  (optional)
  docs.dir                    Documentation directory      (default: $SNAP_COMMON/docs)
  ui.enable-docs              Show docs page in web UI     (default: false)
  ui.host                     Web UI bind address          (default: 127.0.0.1)
  ui.port                     Web UI port                  (default: 3000)

grade: devel
confinement: strict

apps:
  serve:
    command: bin/wrapper-serve
    daemon: simple
    install-mode: disable
    restart-condition: on-failure
    plugs:
      - network       # reach Neo4j and the LLM API
      - network-bind  # bind to server.port

  ui:
    command: bin/wrapper-ui
    daemon: simple
    install-mode: disable
    restart-condition: on-failure
    plugs:
      - network       # nginx proxy to knowledge-server
      - network-bind  # bind to ui.port

parts:
  # ── Rust binaries ──────────────────────────────────────────────────────────
  # Build knowledge-server and harvest-agent from the workspace.
  # apt Rust (≥1.75 on Ubuntu 24.04) is used instead of the rust plugin
  # because the plugin invokes rustup which requires static.rust-lang.org.
  # rust-toolchain.toml is removed before building to avoid rustup complaints.
  rust-binaries:
    plugin: nil
    source: .
    source-type: git
    build-packages:
      - rustc
      - cargo
      - libssl-dev
      - pkg-config
    stage-packages:
      - libssl3
      - ca-certificates
    override-build: |
      rm -f rust-toolchain.toml
      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
      export PATH="$HOME/.cargo/bin:$PATH"
      cargo build --release --workspace
      install -Dm755 target/release/knowledge-server \
        "$SNAPCRAFT_PART_INSTALL/bin/knowledge-server"
      install -Dm755 target/release/harvest-agent \
        "$SNAPCRAFT_PART_INSTALL/bin/harvest-agent"

  # ── Web UI static assets ───────────────────────────────────────────────────
  # Vite produces a self-contained dist/ bundle served by nginx at runtime.
  web-ui:
    plugin: nil
    source: web-ui/
    build-snaps:
      - node/20/stable
    override-build: |
      cd "$SNAPCRAFT_PART_SRC"
      npm ci
      npm run build
      mkdir -p "$SNAPCRAFT_PART_INSTALL/share/harvest-ui"
      cp -r dist/. "$SNAPCRAFT_PART_INSTALL/share/harvest-ui/"

  # ── nginx + envsubst ───────────────────────────────────────────────────────
  nginx:
    plugin: nil
    stage-packages:
      - nginx
      - gettext-base

  # ── Wrapper scripts and static config ─────────────────────────────────────
  wrappers:
    plugin: dump
    source: snap/local/
    organize:
      wrapper-serve:           bin/wrapper-serve
      wrapper-ui:              bin/wrapper-ui
      nginx.conf.template:     etc/harvest/nginx.conf.template
      gen-llm-config.py:       lib/harvest/gen-llm-config.py
