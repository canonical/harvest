server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # Agent console WebSocket routes. Matched before the general API block below
    # because that block clears the Connection header (fine for SSE, fatal for
    # a WebSocket upgrade) — this one instead forwards the Upgrade handshake.
    location ~ ^/(projects/[^/]+/agents/[^/]+/console|agent/console/[^/]+)$ {
        proxy_pass         http://host.docker.internal:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All API routes are proxied to the knowledge-server.
    # proxy_buffering is disabled globally so SSE streams (/agent/events,
    # /*/query/stream, /*/events) are forwarded byte-by-byte without delay.
    location ~ ^/(auth|query|projects|admin|graph|docs|repositories|machines|health|conversations|groups|skills|agents|agent|tool-description|llm)(/.*)?$ {
        proxy_pass         http://host.docker.internal:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Required for SSE: clear Connection header and disable buffering.
        proxy_set_header Connection '';
        proxy_buffering  off;
        proxy_cache      off;

        # LLM queries and agent SSE streams can run for many minutes.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Everything else is the Vue SPA — serve index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
